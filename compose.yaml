services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cleaning_platform}
      MYSQL_USER: ${MYSQL_USER:-wdt_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    image: wdt-dashboard-backend:local
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-wdt_app}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-cleaning_platform}?charset=utf8mb4
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      WDT_SHOP_OWNER_CACHE_SECONDS: ${WDT_SHOP_OWNER_CACHE_SECONDS:-30}
    volumes:
      - ./sync:/app/sync
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    image: wdt-dashboard-web:local
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    network_mode: host
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      web:
        condition: service_started

volumes:
  mysql_data:
